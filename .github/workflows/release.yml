name: Advanced Release Matrix (Monorepo)

on:
  push:
    tags:
      - 'v*' # Autostart on push tag with prefix "v" (e.g. v1.1.1)
  workflow_dispatch: # Button for force build without tag change

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Package
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        goos: [linux, windows]
        goarch: [amd64, arm64, 386]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Needed for manual start for tag history

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.3'
        cache: true
        # Define mask to search ALL go.mod files in project
        cache-dependency-path: |
          core/go.mod
          extensions/**/go.mod

    - name: Determine Tag Name
      id: get_tag
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          TAG_NAME="${{ github.ref_name }}"
        else
          TAG_NAME=$(git describe --tags $(git rev-list --tags --max-count=1))
        fi
        echo "RELEASE_TAG=$TAG_NAME" >> $GITHUB_ENV
        echo "Using TAG: $TAG_NAME"

    - name: Install go-winres & Process Resources for core and extensions
      if: matrix.goos == 'windows'
      run: |
        # Save absolute path to repo root
        ROOT_DIR=$(pwd)

        go install github.com/tc-hib/go-winres@v0.3.3

        # This step creates a .syso file which go build can pick automaticly
        if [ -e "$ROOT_DIR/core/winres/winres.json" ]; then
          cd "$ROOT_DIR/core"
          $(go env GOPATH)/bin/go-winres make --arch amd64,arm64,386 --out ./cmd/rsrc
          cd "$ROOT_DIR"
        fi

        # Generate .syso files for extensions that have winres.json
        cd "$ROOT_DIR"
        if [ -d "extensions" ]; then
          for ext_dir in extensions/*/; do
            if [ -e "$ROOT_DIR/$ext_dir/winres/winres.json" ]; then
              # Changing dir to extension's
              cd "$ROOT_DIR/$ext_dir"
              
              # Check structure: complex (with cmd dir) or simple (with main.go)
              if [ -d "cmd" ]; then
                echo "-> Located structure cmd/ in $ext_dir"
                $(go env GOPATH)/bin/go-winres make --arch amd64,arm64,386 --out ./cmd/rsrc
              else
                echo "-> Simple structure in $ext_dir"
                $(go env GOPATH)/bin/go-winres make --arch amd64,arm64,386 --out ./rsrc
              fi

              # ALWAYS Return to repo root for next iteration
              cd "$ROOT_DIR"
            fi
          done
        fi
      continue-on-error: true

    - name: Build and Assemble Structure
      run: |
        # Save absolute path to repo root
        ROOT_DIR=$(pwd)
        
        # Prepare environment variables
        export GOOS=${{ matrix.goos }}
        export GOARCH=${{ matrix.goarch }}
        export CGO_ENABLED=0
        
        EXT=""
        if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
        
        # Name of target folder for archive
        BUILD_DIR="zapretyan-go-${{ matrix.goos }}-${{ matrix.goarch }}"
        mkdir -p "$BUILD_DIR/extensions"
        
        # COMPILE CORE
        echo "Compiling core (Core)..."
        cd "$ROOT_DIR/core/cmd"
        go build -v -trimpath -ldflags="-s -w -buildid=" -o "$ROOT_DIR/$BUILD_DIR/core$EXT" .
        cd "$ROOT_DIR/core"
        
        # Copy config.toml from core to release root
        if [ -f "config.toml" ]; then
          cp config.toml "$ROOT_DIR/$BUILD_DIR/"
        else
          touch "$ROOT_DIR/$BUILD_DIR/config.toml"
        fi
        
        # COMPILE EXTENSIONS
        cd "$ROOT_DIR"
        if [ -d "extensions" ]; then
          for ext_dir in extensions/*/; do
            if [ -d "$ext_dir" ]; then
              # Get clean extension folder name (e.g. localfs or discord-sender)
              EXT_NAME=$(basename "$ext_dir")
              echo "Process extension: $EXT_NAME"
              
              # Changing dir to extension's
              cd "$ROOT_DIR/$ext_dir"
              
              # Check structure: complex (with cmd dir) or simple (with main.go)
              if [ -d "cmd" ]; then
                echo "-> Located structure cmd/ in $EXT_NAME"
                cd cmd
                go build -v -trimpath -ldflags="-s -w -buildid=" -o "$ROOT_DIR/$BUILD_DIR/extensions/${EXT_NAME}$EXT" .
              elif [ -e "main.go" ]; then
                echo "-> Simple structure in $EXT_NAME"
                go build -v -trimpath -ldflags="-s -w -buildid=" -o "$ROOT_DIR/$BUILD_DIR/extensions/${EXT_NAME}$EXT" .
              fi
              
              # ALWAYS Return to repo root for next iteration
              cd "$ROOT_DIR"
            fi
          done
        fi
        
        # Save folder name for compressing step
        echo "ARCHIVE_SRC=$BUILD_DIR" >> $GITHUB_ENV

    - name: Compress Archives
      run: |
        ARCHIVE_NAME="${{ env.ARCHIVE_SRC }}"
        
        if [ "${{ matrix.goos }}" = "windows" ]; then
          # Compressing 7zip for windows (max compression -mx=9)
          7z a -mx=9 "${ARCHIVE_NAME}.7z" "./${ARCHIVE_SRC}/*"
          echo "RELEASE_ASSET=${ARCHIVE_NAME}.7z" >> $GITHUB_ENV
        else
          # Compressing into tar.gz (GZIP) for Linux (max compression "gzip -9")
          tar --use-compress-program="gzip -9" -cf "${ARCHIVE_NAME}.tar.gz" -C "./${ARCHIVE_SRC}" .
          echo "RELEASE_ASSET=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV
        fi

    - name: Upload or Update Release Asset
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        files: ${{ env.RELEASE_ASSET }}
        make_latest: true
        token: ${{ secrets.GITHUB_TOKEN }}